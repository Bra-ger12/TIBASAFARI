services:
  - type: web
    name: tibasafari-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "bash -c 'python manage.py migrate && daphne -b 0.0.0.0 -p $PORT config.asgi:application'"
    autoDeploy: true
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: ""
      # admin_web has no fixed origin yet (flutter run -d chrome picks a
      # random port each run) — allow all origins for now. Every endpoint
      # still requires a valid JWT bearer token, so this doesn't expose
      # data. Tighten to CORS_ALLOWED_ORIGINS once admin_web has a fixed URL.
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: tibasafari-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: tibasafari-redis
          property: connectionString
      - key: CHANNEL_LAYERS_REDIS_URL
        fromService:
          type: redis
          name: tibasafari-redis
          property: connectionString
      - key: ACCESS_TOKEN_LIFETIME_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_LIFETIME_DAYS
        value: "14"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"

  - type: redis
    name: tibasafari-redis
    plan: free
    ipAllowList: []

databases:
  - name: tibasafari-db
    plan: free
