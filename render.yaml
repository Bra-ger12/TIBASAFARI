services:
  - type: web
    name: tibasafari-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "bash -c 'python manage.py migrate && daphne -b 0.0.0.0 -p $PORT config.asgi:application'"
    autoDeploy: true
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      # Left empty: settings.py already auto-appends the exact hostname
      # Render injects via RENDER_EXTERNAL_HOSTNAME at runtime. A wildcard
      # here (.onrender.com) would accept a Host header from any Render
      # tenant, not just this service — onrender.com is shared hosting.
      - key: ALLOWED_HOSTS
        value: ""
      # Left empty: settings.py already auto-derives the correct
      # https://<RENDER_EXTERNAL_HOSTNAME> trusted origin from the hostname
      # Render injects at runtime. A wildcard here (https://*.onrender.com)
      # would trust CSRF requests whose Origin is *any* onrender.com tenant
      # — onrender.com is shared hosting, so that includes apps other
      # people control, not just ours.
      - key: CSRF_TRUSTED_ORIGINS
        value: ""
      # admin_web is deployed as its own Render static site with a fixed
      # origin (see the tibasafari-admin service below), so production can
      # scope CORS to just that domain instead of allowing every origin.
      # settings.py's CORS_ALLOW_ALL_ORIGINS defaults to True only when
      # DEBUG=True and this list is empty — local dev (flutter run -d
      # chrome, random port each run) keeps working without needing an
      # explicit override here.
      - key: CORS_ALLOWED_ORIGINS
        value: "https://tibasafari-admin.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: tibasafari-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: tibasafari-redis
          property: connectionString
      - key: CHANNEL_LAYERS_REDIS_URL
        fromService:
          type: redis
          name: tibasafari-redis
          property: connectionString
      - key: ACCESS_TOKEN_LIFETIME_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_LIFETIME_DAYS
        value: "14"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: "braytonroger@gmail.com"
      # Gmail App Password (not the account password) — a secret, so it's
      # never committed here. Set it manually in the Render dashboard:
      # Environment → tibasafari-backend → EMAIL_HOST_PASSWORD.
      - key: EMAIL_HOST_PASSWORD
        sync: false
      # Gmail's SMTP relay rejects/flags mail whose From address doesn't
      # match the authenticated account — must be EMAIL_HOST_USER, not the
      # unowned noreply@tibasafari.com default.
      - key: DEFAULT_FROM_EMAIL
        value: "Tiba Safari <braytonroger@gmail.com>"
      # Comma-separated Apple Sign In client IDs (App ID / Services ID) for
      # patient_app's "Continue with Apple" login. Set the real value in the
      # Render dashboard once registered in the Apple Developer portal —
      # left unset here so it isn't committed. Empty/unset disables the
      # provider (backend rejects Apple tokens with a clear error).
      - key: APPLE_SIGN_IN_CLIENT_IDS
        sync: false
      # Google OAuth client ID(s) for patient_app's "Continue with Google"
      # login — the Web application client from Google Cloud Console. Not
      # a secret (it's the public `aud` in every Google sign-in token), so
      # committed directly rather than left for the Render dashboard.
      - key: GOOGLE_OAUTH_CLIENT_IDS
        value: "1029093901039-bljbf5po2so301ctjvaj62p7knsbjfrn.apps.googleusercontent.com"
      # Fare calculation inputs — settings.py already falls back to these
      # exact values if unset, so omitting them never crashes the app. They
      # are listed explicitly here so pricing can be tuned from the Render
      # dashboard without a code change/redeploy.
      - key: FARE_BASE_RATE
        value: "2.50"
      - key: FARE_PER_KM
        value: "1.20"
      - key: FARE_PER_MINUTE
        value: "0.25"
      - key: FARE_MINIMUM
        value: "8.00"
      - key: FARE_WHEELCHAIR_SURCHARGE
        value: "5.00"

  - type: web
    name: tibasafari-admin
    runtime: static
    rootDir: admin_web
    # A cached flutter/ checkout that's missing its .git dir, on the wrong
    # remote, or otherwise corrupted (e.g. a previous build killed mid-clone)
    # used to fail every deploy forever, since `cd flutter && git pull`
    # failing aborted the whole buildCommand with no path to recovery short
    # of manually clearing Render's build cache. Wipe and re-clone instead
    # of giving up whenever the cached checkout isn't in the expected state.
    buildCommand: >-
      if [ -d flutter/.git ] && (cd flutter && git fetch origin stable && git reset --hard origin/stable); then
      echo "Reusing cached Flutter SDK checkout";
      else
      rm -rf flutter && git clone https://github.com/flutter/flutter.git -b stable;
      fi &&
      flutter/bin/flutter config --enable-web &&
      flutter/bin/flutter pub get &&
      flutter/bin/flutter build web --release --dart-define=API_BASE=https://tibasafari-backend.onrender.com/api/v1
    staticPublishPath: build/web
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: redis
    name: tibasafari-redis
    plan: free
    ipAllowList: []

databases:
  - name: tibasafari-db
    plan: free
