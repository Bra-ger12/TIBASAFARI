<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
</head>
<body style="margin:0; padding:0; background-color:#F2FAF6; font-family:Arial, Helvetica, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F2FAF6; padding:32px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:16px; overflow:hidden; border:1px solid #D8E8F2;">
          <tr>
            <td style="background-color:#4FA213; padding:24px 32px;">
              <span style="color:#ffffff; font-size:20px; font-weight:bold;">Tiba Safari</span>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              <h1 style="color:#0E2A3D; font-size:20px; margin:0 0 12px;">Reset your password</h1>
              <p style="color:#668090; font-size:14px; line-height:1.5; margin:0 0 24px;">
                Hi {{ full_name }}, enter this code in the TibaSafari app to reset your password:
              </p>
              <div style="background-color:#F6FBFE; border:1px solid #D8E8F2; border-radius:12px; padding:20px; text-align:center; margin-bottom:24px;">
                <span style="font-size:32px; font-weight:bold; letter-spacing:8px; color:#1E63A7;">{{ code }}</span>
              </div>
              <p style="color:#668090; font-size:13px; margin:0;">
                This code expires in {{ ttl_minutes }} minutes. If you didn't request this, you can safely ignore this email — your password won't change.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
