name: patient_app
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Authentication & Security
  flutter_secure_storage: ^9.2.2
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^8.1.0
  
  # Google Maps & Location
  google_maps_flutter: ^2.17.1
  geolocator: ^13.0.1  # Updated to compatible version
  geocoding: ^4.0.0
  permission_handler: ^11.3.1
  
  # Networking
  http: ^1.2.2

  # Real-time WebSocket
  web_socket_channel: ^3.0.1

  # URL launcher
  url_launcher: ^6.3.1

  # Formatting
  intl: ^0.20.1

  # Medical document uploads
  image_picker: ^1.1.2

  # Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: "assets/images/TIBAPATIENT.png"
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/TIBAPATIENT.png"
  windows:
    generate: true
    image_path: "assets/images/TIBAPATIENT.png"
  macos:
    generate: true
    image_path: "assets/images/TIBAPATIENT.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/tiba-safari-logo.png
    - assets/images/google_logo.png
    - assets/images/apple_logo.png
    - assets/images/TIBAPATIENT.png
